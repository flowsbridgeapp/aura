<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS — P2P Мессенджер</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:,">
    
    <!-- PWA метатеги (временно упрощено) -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#00ffff">
</head>
<body>
    <div class="container">
        <h1>🌌 NEXUS P2P Мессенджер</h1>

        <div class="room-controls">
            <input type="text" id="roomIdInput" placeholder="Имя комнаты" value="test-room">
            <input type="text" id="peerNameInput" placeholder="Ваше имя" value="User_">
            <button id="joinBtn">🚪 Присоединиться</button>
            <button id="leaveBtn" disabled>🚪 Покинуть</button>
        </div>

        <div class="status-area">
            <div id="connectionStatus">🔴 Не в сети</div>
            <div id="peersList">👥 Пиры: нет</div>
        </div>

        <div class="main-area">
            <div class="chat-area">
                <h3>Чат</h3>
                <div id="messages" class="messages-box"></div>
                <div class="message-input-area">
                    <input type="text" id="messageInput" placeholder="Сообщение..." disabled>
                    <button id="sendMsgBtn" disabled>📤 Отправить</button>
                </div>
                <div class="file-input-area">
                    <input type="file" id="fileInput" disabled>
                    <button id="sendFileBtn" disabled>📎 Отправить файл</button>
                </div>
            </div>

            <div class="video-area">
                <h3>Видео-звонок</h3>
                <div class="video-controls">
                    <button id="startVideoBtn" disabled>🎥 Начать</button>
                    <button id="stopVideoBtn" disabled>⏹️ Остановить</button>
                </div>
                <div class="videos-container">
                    <div class="video-wrapper">
                        <video id="localVideo" autoplay muted playsinline></video>
                        <span>Вы</span>
                    </div>
                    <div id="remoteVideos" class="remote-videos"></div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const SUPABASE_URL = 'https://dlvlruldmaomehvcdofx.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRsdmxydWxkbWFvbWVodmNkb2Z4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NzQyMDAsImV4cCI6MjA5MDA1MDIwMH0.pwEQNa_yVGAg2SsQn92qyeZlCqF__303eoFxKkNvufA';

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentChannel = null;
let myPeerId = 'user-' + Math.random().toString(36).substring(2, 11);
let myName = 'User_' + Math.random().toString(36).substring(2, 6);
let localStream = null;
const peerConnections = new Map(); // peerId → RTCPeerConnection

// DOM элементы (оставляем как есть)
const roomIdInput = document.getElementById('roomIdInput');
const peerNameInput = document.getElementById('peerNameInput');
const joinBtn = document.getElementById('joinBtn');
const leaveBtn = document.getElementById('leaveBtn');
const connectionStatus = document.getElementById('connectionStatus');
const peersListDiv = document.getElementById('peersList');
const messagesDiv = document.getElementById('messages');
const messageInput = document.getElementById('messageInput');
const sendMsgBtn = document.getElementById('sendMsgBtn');
const fileInput = document.getElementById('fileInput');
const sendFileBtn = document.getElementById('sendFileBtn');
const startVideoBtn = document.getElementById('startVideoBtn');
const stopVideoBtn = document.getElementById('stopVideoBtn');
const localVideo = document.getElementById('localVideo');
const remoteVideos = document.getElementById('remoteVideos');

peerNameInput.value = myName;

// === UI функции (оставляем как было) ===
function addMessage(text, isOwn = false) {
    const msgDiv = document.createElement('div');
    msgDiv.className = `message ${isOwn ? 'own' : 'other'}`;
    const name = isOwn ? 'Вы' : 'Пользователь';
    msgDiv.innerHTML = `<strong>${name}:</strong> ${text} <small>${new Date().toLocaleTimeString()}</small>`;
    messagesDiv.appendChild(msgDiv);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

function updateUIAfterJoin() {
    joinBtn.disabled = true;
    leaveBtn.disabled = false;
    messageInput.disabled = false;
    sendMsgBtn.disabled = false;
    fileInput.disabled = false;
    sendFileBtn.disabled = false;
    startVideoBtn.disabled = false;
    connectionStatus.innerHTML = '🟢 Подключено к комнате';
    connectionStatus.style.color = '#0f0';
    addMessage('✅ Вы присоединились к комнате', true);
}

function updateUIAfterLeave() {
    joinBtn.disabled = false;
    leaveBtn.disabled = true;
    messageInput.disabled = true;
    sendMsgBtn.disabled = true;
    fileInput.disabled = true;
    sendFileBtn.disabled = true;
    startVideoBtn.disabled = true;
    stopVideoBtn.disabled = true;
    connectionStatus.innerHTML = '🔴 Отключено';
    connectionStatus.style.color = 'red';
}

function updatePeersList(state) {
    const count = Object.keys(state || {}).length;
    peersListDiv.innerHTML = `👥 В комнате: ${count} участник${count !== 1 ? 'ов' : ''}`;
}

// === JOIN ROOM (Presence + Broadcast) ===
joinBtn.addEventListener('click', async () => {
    const roomName = roomIdInput.value.trim() || 'test-room';
    myName = peerNameInput.value.trim() || myName;

    if (currentChannel) currentChannel.unsubscribe();

    currentChannel = supabase.channel(roomName, {
        config: { presence: { key: myPeerId } }
    });

    currentChannel.on('presence', { event: 'sync' }, () => {
        updatePeersList(currentChannel.presenceState());
    });

    currentChannel.on('presence', { event: 'join' }, ({ newPresences }) => {
        newPresences.forEach(p => addMessage(`👋 ${p.name || 'Пользователь'} присоединился`));
    });

    currentChannel.on('broadcast', { event: 'chat' }, ({ payload }) => {
        if (payload.peerId !== myPeerId) addMessage(payload.text);
    });

    currentChannel.on('broadcast', { event: 'file' }, ({ payload }) => {
        const blob = new Blob([payload.data], { type: payload.type });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = payload.name;
        a.textContent = `📎 Скачать: ${payload.name}`;
        a.style.display = 'block';
        messagesDiv.appendChild(a);
    });

    // === WebRTC Signaling через Broadcast ===
    currentChannel.on('broadcast', { event: 'webrtc' }, ({ payload }) => {
        handleWebRTCSignal(payload);
    });

    await currentChannel.subscribe((status) => {
        if (status === 'SUBSCRIBED') {
            currentChannel.track({ peerId: myPeerId, name: myName });
            updateUIAfterJoin();
        }
    });
});

// === SEND MESSAGE и SEND FILE (оставляем как было) ===
sendMsgBtn.addEventListener('click', async () => {
    const text = messageInput.value.trim();
    if (!text || !currentChannel) return;
    await currentChannel.send({ type: 'broadcast', event: 'chat', payload: { text, peerId: myPeerId } });
    addMessage(text, true);
    messageInput.value = '';
});

sendFileBtn.addEventListener('click', async () => {
    const file = fileInput.files[0];
    if (!file || !currentChannel) return;
    const reader = new FileReader();
    reader.onload = async (e) => {
        await currentChannel.send({
            type: 'broadcast',
            event: 'file',
            payload: { data: e.target.result, name: file.name, type: file.type || 'application/octet-stream' }
        });
        addMessage(`📎 Отправлен файл: ${file.name}`, true);
    };
    reader.readAsArrayBuffer(file);
    fileInput.value = '';
});

// ==================== WEBRTC ====================

const iceConfig = {
    iceServers: [
        { urls: 'stun:stun.l.google.com:19302' },
        { urls: 'stun:stun1.l.google.com:19302' }
    ]
};

async function createPeerConnection(peerId) {
    const pc = new RTCPeerConnection(iceConfig);
    peerConnections.set(peerId, pc);

    // Добавляем локальный поток
    if (localStream) {
        localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
    }

    // Получаем удалённый поток
    pc.ontrack = (event) => {
        const remoteVideo = document.createElement('video');
        remoteVideo.autoplay = true;
        remoteVideo.playsInline = true;
        remoteVideo.srcObject = event.streams[0];
        const wrapper = document.createElement('div');
        wrapper.className = 'video-wrapper';
        wrapper.appendChild(remoteVideo);
        wrapper.appendChild(document.createTextNode(` ${peerId}`));
        remoteVideos.appendChild(wrapper);
    };

    // ICE candidates
    pc.onicecandidate = (event) => {
        if (event.candidate && currentChannel) {
            currentChannel.send({
                type: 'broadcast',
                event: 'webrtc',
                payload: {
                    type: 'ice-candidate',
                    candidate: event.candidate,
                    from: myPeerId,
                    to: peerId
                }
            });
        }
    };

    return pc;
}

async function handleWebRTCSignal(payload) {
    const { type, from, to, offer, answer, candidate } = payload;

    if (to && to !== myPeerId) return; // не для нас

    let pc = peerConnections.get(from);
    if (!pc) pc = await createPeerConnection(from);

    if (type === 'offer') {
        await pc.setRemoteDescription(new RTCSessionDescription(offer));
        const ans = await pc.createAnswer();
        await pc.setLocalDescription(ans);
        currentChannel.send({
            type: 'broadcast',
            event: 'webrtc',
            payload: { type: 'answer', answer: pc.localDescription, from: myPeerId, to: from }
        });
    } 
    else if (type === 'answer') {
        await pc.setRemoteDescription(new RTCSessionDescription(answer));
    } 
    else if (type === 'ice-candidate' && candidate) {
        await pc.addIceCandidate(new RTCIceCandidate(candidate));
    }
}

// === Запуск видео ===
startVideoBtn.addEventListener('click', async () => {
    try {
        localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        localVideo.srcObject = localStream;

        // Отправляем offer всем текущим пирам
        const state = currentChannel.presenceState();
        for (const peerId in state) {
            if (peerId === myPeerId) continue;
            const pc = await createPeerConnection(peerId);
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            currentChannel.send({
                type: 'broadcast',
                event: 'webrtc',
                payload: { type: 'offer', offer: pc.localDescription, from: myPeerId, to: peerId }
            });
        }

        startVideoBtn.disabled = true;
        stopVideoBtn.disabled = false;
        addMessage('🎥 Видеозвонок запущен', true);
    } catch (err) {
        console.error(err);
        addMessage('❌ Ошибка доступа к камере/микрофону', true);
    }
});

stopVideoBtn.addEventListener('click', () => {
    if (localStream) {
        localStream.getTracks().forEach(track => track.stop());
        localStream = null;
        localVideo.srcObject = null;
    }
    peerConnections.forEach(pc => pc.close());
    peerConnections.clear();
    remoteVideos.innerHTML = '';
    startVideoBtn.disabled = false;
    stopVideoBtn.disabled = true;
    addMessage('⏹️ Видеозвонок остановлен', true);
});

leaveBtn.addEventListener('click', () => {
    if (currentChannel) currentChannel.unsubscribe();
    currentChannel = null;
    if (localStream) localStream.getTracks().forEach(t => t.stop());
    updateUIAfterLeave();
});

updateUIAfterLeave();
</script>
</body>
</html>
