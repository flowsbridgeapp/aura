<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P Мессенджер / Supabase</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:,">
    <!-- PWA метатеги -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0066ff">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="P2P Messenger">
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png">
    <!-- Регистрация Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(registration => {
                        console.log('Service Worker зарегистрирован:', registration);
                    })
                    .catch(error => {
                        console.log('Ошибка регистрации Service Worker:', error);
                    });
            });
        }
    </script>
</head>
<body>
    <div class="container">
        <h1>📡 P2P Мессенджер (Supabase стратегия)</h1>
        <div id="installPrompt" style="display: none; background: #0066ff; color: white; padding: 10px; border-radius: 8px; margin-bottom: 15px; text-align: center;">
    📱 Установите приложение на телефон: 
        <button id="installBtn" style="background: white; color: #0066ff; border: none; padding: 5px 15px; border-radius: 5px; margin-left: 10px;">Установить</button>
        </div>

        <div class="room-controls">
            <input type="text" id="roomIdInput" placeholder="Имя комнаты" value="test-room">
            <input type="text" id="peerNameInput" placeholder="Ваше имя" value="User_">
            <button id="joinBtn">🚪 Присоединиться</button>
            <button id="leaveBtn" disabled>🚪 Покинуть</button>
        </div>

        <div class="status-area">
            <div id="connectionStatus">🔴 Не в сети</div>
            <div id="peersList">👥 Пиры: нет</div>
        </div>

        <div class="main-area">
            <div class="chat-area">
                <h3>Чат</h3>
                <div id="messages" class="messages-box"></div>
                <div class="message-input-area">
                    <input type="text" id="messageInput" placeholder="Сообщение..." disabled>
                    <button id="sendMsgBtn" disabled>📤 Отправить</button>
                </div>
                <div class="file-input-area">
                    <input type="file" id="fileInput" disabled>
                    <button id="sendFileBtn" disabled>📎 Отправить файл</button>
                </div>
                <div id="fileProgress"></div>
            </div>

            <div class="video-area">
                <h3>Видео-звонок</h3>
                <div class="video-controls">
                    <button id="startVideoBtn" disabled>🎥 Начать</button>
                    <button id="stopVideoBtn" disabled>⏹️ Остановить</button>
                </div>
                <div class="videos-container">
                    <div class="video-wrapper">
                        <video id="localVideo" autoplay muted playsinline></video>
                        <span>Вы</span>
                    </div>
                    <div id="remoteVideos" class="remote-videos"></div>
                </div>
            </div>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "trystero/supabase": "https://unpkg.com/trystero@0.22.0/src/supabase.js",
                "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.39.0"
            }
        }
    </script>

    <script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const SUPABASE_URL = 'https://dlvlruldmaomehvcdofx.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRsdmxydWxkbWFvbWVodmNkb2Z4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NzQyMDAsImV4cCI6MjA5MDA1MDIwMH0.pwEQNa_yVGAg2SsQn92qyeZlCqF__303eoFxKkNvufA'; // ← твой реальный ключ

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentChannel = null;
let myPeerId = 'user-' + Math.random().toString(36).substring(2, 11);
let myName = 'User_' + Math.random().toString(36).substring(2, 6);

const roomIdInput = document.getElementById('roomIdInput');
const peerNameInput = document.getElementById('peerNameInput');
const joinBtn = document.getElementById('joinBtn');
const leaveBtn = document.getElementById('leaveBtn');
const connectionStatus = document.getElementById('connectionStatus');
const peersListDiv = document.getElementById('peersList');
const messagesDiv = document.getElementById('messages');
const messageInput = document.getElementById('messageInput');
const sendMsgBtn = document.getElementById('sendMsgBtn');
const startVideoBtn = document.getElementById('startVideoBtn');
const stopVideoBtn = document.getElementById('stopVideoBtn');

// Инициализация
peerNameInput.value = myName;

function addMessage(text, isOwn = false) {
    const msgDiv = document.createElement('div');
    msgDiv.className = `message ${isOwn ? 'own' : 'other'}`;
    const name = isOwn ? 'Вы' : 'Пользователь';
    msgDiv.innerHTML = `<strong>${name}:</strong> ${text} <small>${new Date().toLocaleTimeString()}</small>`;
    messagesDiv.appendChild(msgDiv);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

function updateUIAfterJoin() {
    joinBtn.disabled = true;
    leaveBtn.disabled = false;
    messageInput.disabled = false;
    sendMsgBtn.disabled = false;
    startVideoBtn.disabled = false;
    connectionStatus.innerHTML = '🟢 Подключено к комнате';
    connectionStatus.style.color = '#0f0';
    addMessage('✅ Вы успешно присоединились к комнате', true);
}

function updateUIAfterLeave() {
    joinBtn.disabled = false;
    leaveBtn.disabled = true;
    messageInput.disabled = true;
    sendMsgBtn.disabled = true;
    startVideoBtn.disabled = true;
    connectionStatus.innerHTML = '🔴 Отключено';
    connectionStatus.style.color = 'red';
}

function updatePeersList(state) {
    const count = Object.keys(state || {}).length;
    peersListDiv.innerHTML = `👥 В комнате: ${count} участник${count > 1 ? 'ов' : ''}`;
}

// Присоединение
joinBtn.addEventListener('click', async () => {
    const roomName = roomIdInput.value.trim() || 'test-room';
    myName = peerNameInput.value.trim() || myName;

    if (currentChannel) currentChannel.unsubscribe();

    currentChannel = supabase.channel(roomName, {
        config: { presence: { key: myPeerId } }
    });

    currentChannel.on('presence', { event: 'sync' }, () => {
        const state = currentChannel.presenceState();
        console.log('Presence sync:', state);
        updatePeersList(state);
    });

    currentChannel.on('presence', { event: 'join' }, ({ newPresences }) => {
        newPresences.forEach(p => {
            addMessage(`👋 ${p.name || 'Новый пользователь'} присоединился`);
        });
    });

    currentChannel.on('broadcast', { event: 'chat' }, ({ payload }) => {
        if (payload.peerId !== myPeerId) {
            addMessage(payload.text);
        }
    });

    const status = await currentChannel.subscribe((subStatus) => {
        console.log('Subscribe status:', subStatus);

        if (subStatus === 'SUBSCRIBED') {
            currentChannel.track({ peerId: myPeerId, name: myName });
            updateUIAfterJoin();
        }
    });
});

// Отправка сообщения
sendMsgBtn.addEventListener('click', async () => {
    const text = messageInput.value.trim();
    if (!text || !currentChannel) return;

    await currentChannel.send({
        type: 'broadcast',
        event: 'chat',
        payload: { text, peerId: myPeerId }
    });

    addMessage(text, true);
    messageInput.value = '';
});

messageInput.addEventListener('keypress', e => {
    if (e.key === 'Enter') sendMsgBtn.click();
});

leaveBtn.addEventListener('click', () => {
    if (currentChannel) {
        currentChannel.unsubscribe();
        currentChannel = null;
    }
    updateUIAfterLeave();
});

// Начальное состояние
updateUIAfterLeave();
</script>
    
</body>
</html>
